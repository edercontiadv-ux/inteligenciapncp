name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app health endpoint
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            https://inteligenciapncp.web.app/api/health
