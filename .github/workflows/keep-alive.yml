name: Keep Supabase Alive

on:
  schedule:
    - cron: '*/6 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            https://inteligenciapncp.web.app/api/health

      - name: Trigger DB query via planos page
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            https://inteligenciapncp.web.app/planos

      - name: Hit login page (DB user lookup)
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            https://inteligenciapncp.web.app/login
