<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inteligência PNCP — Indisponível</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #faf8f5;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container { text-align: center; max-width: 480px; }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; }
    p { font-size: 0.9rem; color: #6b6b80; line-height: 1.6; }
    .retry {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.6rem 1.5rem;
      background: #c8a96e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
    }
    .retry:hover { background: #b8995e; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Serviço temporariamente indisponível</h1>
    <p>O Inteligência PNCP está passando por uma breve manutenção. Tente novamente em alguns instantes.</p>
    <a class="retry" href="javascript:location.reload()">Tentar novamente</a>
  </div>
</body>
</html>
